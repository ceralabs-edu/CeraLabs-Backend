# Number of worker processes for Nginx (usually set to number of CPU cores)
worker_processes 1;

# Events block: sets the maximum number of simultaneous connections that can be opened by a worker process
# worker_connections: maximum number of connections per worker
# This limits the total number of simultaneous connections to worker_processes * worker_connections

events { worker_connections 1024; }

http {
    # Define a shared memory zone for rate limiting by client IP address
    # $binary_remote_addr: binary representation of client IP
    # zone=api_limit:10m - name and size of the shared memory zone
    # rate=10r/s - limit to 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        # Listen on port 80 (HTTP)
        listen 80;
        # Accept requests for any server name (wildcard)
        server_name _;

        # Apply rate limiting to all requests in this server block
        # burst=20: allow up to 20 requests to exceed the rate limit temporarily
        # nodelay: do not delay excess requests, reject immediately if burst exceeded
        limit_req zone=api_limit burst=20 nodelay;

        location / {
            # Forward all requests to the backend service (Docker service name: ceralabs-backend, port 8080)
            proxy_pass http://ceralabs-backend:8080;
            # Pass original Host header to backend
            proxy_set_header Host $host;
            # Pass real client IP to backend
            proxy_set_header X-Real-IP $remote_addr;
            # Pass original X-Forwarded-For header plus client IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
