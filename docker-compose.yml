services:
  postgres:
    image: postgres:16
    container_name: postgres-service
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5463:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ci/data.csv:/docker-entrypoint-initdb.d/data.csv
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: redis-service
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-service
    restart: always
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - app-network

  app:
    build: .
#    image: bananaonthetree/backend-neurade:0.0.12
    container_name: neurade-app
    restart: always
    ports:
      - "${SERVER_OUTER_PORT}:8080"
    environment:
      # ===== Database =====
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}

      # ===== MinIO =====
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS: ${MINIO_ACCESS}
      MINIO_SECRET: ${MINIO_SECRET}
      MINIO_BUCKET_PFP: ${MINIO_BUCKET_PFP}
      MINIO_BUCKET_CHAT: ${MINIO_BUCKET_CHAT}
      MINIO_BUCKET_ASSIGNMENT: ${MINIO_BUCKET_ASSIGNMENT}

      # ===== Redis =====
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

      # ===== RabbitMQ =====
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      # ===== LLM =====
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_VALIDATE_ENDPOINT: ${LLM_VALIDATE_ENDPOINT}
      LLM_QA_ENDPOINT: ${LLM_QA_ENDPOINT}
      LLM_ASSIGNMENT_OCR_ENDPOINT: ${LLM_ASSIGNMENT_OCR_ENDPOINT}
      LLM_TOP_K: ${LLM_TOP_K}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS}

      # ===== JWT =====
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      # ===== JPA =====
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL}

      # ===== ADDITIONAL SETTINGS =====
      CSV_FILE: ${CSV_FILE}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: neurade-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    env_file:
      - .env

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
