services:
  postgres:
    image: postgres:16
    container_name: postgres-service
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5463:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ci/data.csv:/docker-entrypoint-initdb.d/data.csv
      - ./ci/import_address.sql:/docker-entrypoint-initdb.d/import_address.sql
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio-service
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET}
    ports:
      - "9003:9000"   # API
      - "9006:9001"   # Console UI
    volumes:
      - minio_data:/data
    networks:
      - app-network

  app:
    build: .
    container_name: neurade-app
    restart: always
    ports:
      - "8836:8080"
    environment:
      # ===== Database =====
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}

      # ===== MinIO =====
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS: ${MINIO_ACCESS}
      MINIO_SECRET: ${MINIO_SECRET}
      MINIO_BUCKET_PFP: ${MINIO_BUCKET_PFP}
      MINIO_BUCKET_CHAT: ${MINIO_BUCKET_CHAT}

      # ===== LLM =====
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_VALIDATE_ENDPOINT: ${LLM_VALIDATE_ENDPOINT}
      LLM_QA_ENDPOINT: ${LLM_QA_ENDPOINT}
      LLM_TOP_K: ${LLM_TOP_K}

      # ===== JWT =====
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}

      # ===== JPA =====
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL}

    depends_on:
      - postgres
      - minio
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: